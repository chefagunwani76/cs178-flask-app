<!DOCTYPE html>
<html>
<head>
    <title>Country Query</title>
    <!-- Used ChatGPT for styling help, see README-->
    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2>Which country would you like to query?</h2>

    <!-- Flash messages (important for debugging) -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <!-- COUNTRY FORM -->
    <form action="{{ url_for('country_query') }}" method="POST">
        <div class="form-group">
            <label>Select Country</label>
            <select name="country" class="form-control" required>
                <option value="">-- Select a country --</option>
                {% for c in countries %}
                    <option value="{{ c.Name }}">{{ c.Name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">
            Search
        </button>
    </form>
    <br>
    <!-- VIEW ALL COUNTRIES -->
    <form action="{{ url_for('all_countries') }}" method="GET">

        <button type="submit" class="btn btn-info">
            View All Countries
        </button>

    </form>
</div>
</body>
</html>
