<!DOCTYPE html>
<html>
<head>
    <title>Country Query</title>
</head>
<body>

    <h2>Which country would you like to query?</h2>
    <form action="{{ url_for('country_query') }}" method="POST">
    <select name="country" required>
        <option value="">-- Select a country --</option>
        {% for c in countries %}
            <option value="{{ c.Name }}">{{ c.Name }}</option>
        {% endfor %}
    </select>
    <button type="submit">Search</button>
</form>
<br>
<form action="{{ url_for('all_countries') }}" method="GET">
    <button type="submit">View All Countries</button>
</form>


</body>
</html>
