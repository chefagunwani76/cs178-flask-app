<!DOCTYPE html>
<html>
<head>
    <title>All Countries</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>All Countries</h2>
    <p class="text-muted">List of all countries in the database</p>
    <table class="table table-striped table-bordered mt-3">
        <thead class="thead-dark">
            <tr>
                <th>Country</th>
                <th>Capital</th>
                <th>Region</th>
            </tr>
        </thead>
        <tbody>
            {% for c in countries %}
            <tr>
                <td>{{ c.Name }}</td>
                <td>{{ c.Capital }}</td>
                <td>{{ c.Region }}</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>
    <a href="{{ url_for('country_query') }}" class="btn btn-primary">
        Back to Query
    </a>
</div>
</body>
</html>
